<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VALORA Advanced</title>

<style>
:root {
  --bg: #f5f6fa;
  --panel: #ffffff;
  --text: #111;
  --muted: #6b7280;
  --accent: #4f46e5;
  --border: #e5e7eb;
}

[data-theme="dark"] {
  --bg: #0b1220;
  --panel: #111827;
  --text: #f9fafb;
  --muted: #9ca3af;
  --border: #1f2937;
}

* {
  box-sizing: border-box;
  font-family: system-ui, Arial;
}

body {
  margin: 0;
  display: flex;
  height: 100vh;
  background: var(--bg);
  color: var(--text);
}

/* SIDEBAR */
.sidebar {
  width: 300px;
  background: var(--panel);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  padding: 12px;
}

.logo {
  font-size: 20px;
  font-weight: 800;
  color: var(--accent);
  margin-bottom: 10px;
}

.btn {
  background: var(--accent);
  border: none;
  color: white;
  padding: 8px;
  margin: 4px 0;
  border-radius: 8px;
  cursor: pointer;
}

.btn.secondary {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text);
}

input {
  padding: 10px;
  border-radius: 8px;
  border: 1px solid var(--border);
  margin: 6px 0;
  background: transparent;
  color: var(--text);
}

/* NOTE LIST */
.note-list {
  flex: 1;
  overflow-y: auto;
  margin-top: 10px;
}

.note {
  padding: 10px;
  margin-bottom: 6px;
  border-radius: 10px;
  border: 1px solid var(--border);
  cursor: pointer;
}

.note.active {
  background: var(--accent);
  color: white;
}

.note small {
  display: block;
  opacity: 0.7;
}

/* MAIN */
.main {
  flex: 1;
  display: flex;
  flex-direction: column;
}

.topbar {
  display: flex;
  gap: 8px;
  padding: 10px;
  background: var(--panel);
  border-bottom: 1px solid var(--border);
}

.editor {
  flex: 1;
  display: flex;
  flex-direction: column;
  padding: 10px;
  gap: 10px;
}

textarea {
  flex: 1;
  padding: 12px;
  border-radius: 10px;
  border: 1px solid var(--border);
  background: var(--panel);
  color: var(--text);
  resize: none;
}

.meta {
  font-size: 12px;
  color: var(--muted);
}
</style>
</head>

<body>

<div class="sidebar">
  <div class="logo">VALORA</div>

  <button class="btn" onclick="createNote()">+ New Note</button>
  <button class="btn secondary" onclick="toggleTheme()">🌙 Theme</button>

  <input placeholder="Search notes..." oninput="setSearch(this.value)">

  <div class="note-list" id="list"></div>
</div>

<div class="main">

  <div class="topbar">
    <input id="title" placeholder="Title..." oninput="updateNote()">
    <input id="tags" placeholder="#tags (comma separated)" oninput="updateNote()">
    <button class="btn secondary" onclick="pinNote()">📌</button>
    <button class="btn secondary" onclick="deleteNote()">🗑</button>
  </div>

  <div class="editor">
    <textarea id="content" placeholder="Write anything..." oninput="updateNote()"></textarea>
    <div class="meta" id="meta"></div>
  </div>

</div>

<script>

let notes = JSON.parse(localStorage.getItem("valora_v2") || "[]");
let active = null;
let search = "";

/* INIT */
function init(){
  if(notes.length === 0){
    createNote();
  } else {
    active = notes[0].id;
  }
  render();
}

/* CREATE */
function createNote(){
  const n = {
    id: Date.now(),
    title: "New note",
    content: "",
    tags: [],
    pinned: false,
    created: new Date(),
    updated: new Date(),
    deleted: false
  };

  notes.unshift(n);
  active = n.id;
  save();
  render();
}

/* UPDATE */
function updateNote(){
  const n = getActive();
  if(!n) return;

  n.title = title.value;
  n.content = content.value;
  n.tags = tags.value.split(",").map(t => t.trim()).filter(Boolean);
  n.updated = new Date();

  save();
  renderList();
  updateMeta();
}

/* PIN */
function pinNote(){
  const n = getActive();
  if(!n) return;
  n.pinned = !n.pinned;
  save();
  renderList();
}

/* DELETE → TRASH */
function deleteNote(){
  const n = getActive();
  if(!n) return;
  n.deleted = true;
  active = notes.find(x => !x.deleted)?.id || null;
  save();
  render();
}

/* SEARCH */
function setSearch(v){
  search = v.toLowerCase();
  renderList();
}

/* GET ACTIVE */
function getActive(){
  return notes.find(n => n.id === active);
}

/* RENDER */
function render(){
  renderList();

  const n = getActive();
  if(!n){
    title.value = "";
    content.value = "";
    tags.value = "";
    return;
  }

  title.value = n.title;
  content.value = n.content;
  tags.value = n.tags.join(", ");
  updateMeta();
}

/* LIST */
function renderList(){
  const list = document.getElementById("list");
  list.innerHTML = "";

  let filtered = notes.filter(n =>
    !n.deleted &&
    (
      n.title.toLowerCase().includes(search) ||
      n.content.toLowerCase().includes(search) ||
      n.tags.join(",").toLowerCase().includes(search)
    )
  );

  filtered.sort((a,b)=> b.pinned - a.pinned || b.updated - a.updated);

  filtered.forEach(n=>{
    const div = document.createElement("div");
    div.className = "note" + (n.id === active ? " active" : "");
    div.innerHTML = `
      <b>${n.pinned ? "📌 " : ""}${n.title}</b>
      <small>${n.tags.map(t=>"#"+t).join(" ")}</small>
    `;
    div.onclick = ()=>{ active = n.id; render(); };
    list.appendChild(div);
  });
}

/* META */
function updateMeta(){
  const n = getActive();
  if(!n) return;
  meta.innerText = 
    "Created: " + new Date(n.created).toLocaleString() +
    " | Updated: " + new Date(n.updated).toLocaleString();
}

/* SAVE */
function save(){
  localStorage.setItem("valora_v2", JSON.stringify(notes));
}

/* THEME */
function toggleTheme(){
  const t = document.body.getAttribute("data-theme");
  document.body.setAttribute("data-theme", t === "dark" ? "light" : "dark");
}

init();

</script>

</body>
</html>
