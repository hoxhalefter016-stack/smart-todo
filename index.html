<html lang="sq">
<head>
    <meta charset="UTF-8">

    <title>Smart Organizer Pro - Advanced Todo App</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        
        :root {
            --primary: #3b82f6;
            --secondary: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --bg-dark: #0f172a;
            --bg-light: #f8fafc;
            --text-dark: #0f172a;
            --text-light: #f8fafc;
            --border: #e2e8f0;
            --shadow: 0 4px 12px rgba(0,0,0,0.1);
        }

        body.dark-mode {
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            color: var(--text-light);
        }

        body.light-mode {
            background: var(--bg-light);
            color: var(--text-dark);
        }

        body { min-height: 100vh; padding-bottom: 100px; transition: all 0.3s ease; }

        header {
            position: sticky;
            top: 0;
            z-index: 1000;
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(10px);
        }

        body.dark-mode header {
            background: rgba(15, 23, 42, 0.9);
            border-bottom-color: rgba(255, 255, 255, 0.08);
        }

        body.light-mode header {
            background: white;
            border-bottom-color: var(--border);
        }

        #app-title { font-size: 20px; font-weight: 700; color: var(--primary); }

        .header-controls { display: flex; gap: 10px; align-items: center; }

        .theme-toggle, .info-btn {
            background: none;
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: inherit;
            padding: 8px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 18px;
            transition: all 0.2s;
        }

        body.light-mode .theme-toggle,
        body.light-mode .info-btn {
            border-color: var(--border);
        }

        .theme-toggle:hover, .info-btn:hover { background: rgba(255, 255, 255, 0.1); }

        .page { display: none; padding: 20px; animation: fadeIn 0.3s ease; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Input Styles */
        .input-group { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        input, textarea, select {
            flex: 1;
            min-width: 200px;
            padding: 12px 16px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            font-size: 15px;
            outline: none;
            transition: all 0.3s;
        }

        body.dark-mode input, body.dark-mode textarea, body.dark-mode select {
            background: rgba(255, 255, 255, 0.05);
            color: white;
        }

        body.light-mode input, body.light-mode textarea, body.light-mode select {
            background: white;
            color: var(--text-dark);
            border-color: var(--border);
        }

        input::placeholder, textarea::placeholder { color: #94a3b8; }

        input:focus, textarea:focus, select:focus {
            border-color: var(--primary);
            box-shadow: 0 0 10px rgba(59, 130, 246, 0.2);
        }

        /* Buttons */
        button {
            padding: 12px 20px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 500;
            font-size: 15px;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .btn-primary { background: var(--primary); color: white; }
        .btn-success { background: var(--secondary); color: white; }
        .btn-danger { background: var(--danger); color: white; }
        .btn-warning { background: var(--warning); color: white; }
        .btn-sm { padding: 6px 12px; font-size: 13px; }
        .btn-full { width: 100%; margin-top: 10px; }

        button:hover { transform: translateY(-2px); box-shadow: var(--shadow); }
        button:active { transform: scale(0.98); }

        /* List Items */
        .list-item {
            padding: 16px;
            border-radius: 10px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s;
        }

        body.dark-mode .list-item {
            background: rgba(255, 255, 255, 0.03);
        }

        body.light-mode .list-item {
            background: white;
            border-color: var(--border);
        }

        .list-item.completed { opacity: 0.6; }
        .list-item.completed span { text-decoration: line-through; }

        .list-item-content { flex: 1; }
        .list-item-content span { display: block; margin-bottom: 4px; }
        .list-item-meta { font-size: 12px; color: #94a3b8; }

        .priority-badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
            margin-right: 8px;
        }

        .priority-high { background: rgba(239, 68, 68, 0.2); color: #fca5a5; }
        .priority-medium { background: rgba(245, 158, 11, 0.2); color: #fbbf24; }
        .priority-low { background: rgba(34, 197, 94, 0.2); color: #86efac; }

        .action-btns { display: flex; gap: 6px; flex-wrap: wrap; }

        /* Stats Container */
        .stats-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 16px; margin-bottom: 20px; }

        .stat-card {
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s;
        }

        body.dark-mode .stat-card {
            background: rgba(255, 255, 255, 0.03);
        }

        body.light-mode .stat-card {
            background: white;
            border-color: var(--border);
        }

        .stat-label { font-size: 12px; color: #94a3b8; margin-bottom: 8px; }
        .stat-number { font-size: 28px; font-weight: 700; color: var(--primary); }

        /* Bottom Navigation */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            display: flex;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 999;
            backdrop-filter: blur(10px);
        }

        body.dark-mode .bottom-nav {
            background: rgba(15, 23, 42, 0.95);
        }

        body.light-mode .bottom-nav {
            background: white;
            border-top-color: var(--border);
        }

        .nav-item {
            flex: 1;
            text-align: center;
            padding: 12px 8px;
            color: #94a3b8;
            cursor: pointer;
            font-size: 12px;
            font-weight: 500;
            transition: all 0.2s;
        }

        .nav-item.active { color: var(--primary); font-weight: 600; }
        .nav-icon { font-size: 20px; display: block; margin-bottom: 4px; }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }

        .modal.active { display: flex; }

        .modal-content {
            background: white;
            padding: 24px;
            border-radius: 12px;
            max-width: 500px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        body.dark-mode .modal-content {
            background: #1e293b;
            color: white;
        }

        .modal-header { margin-bottom: 16px; font-size: 18px; font-weight: 700; }
        .modal-close { float: right; cursor: pointer; font-size: 20px; }

        /* Language Buttons */
        .lang-btn {
            width: 100%;
            padding: 14px;
            margin-bottom: 8px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            background: transparent;
            color: inherit;
            font-size: 15px;
            font-weight: 500;
            text-align: left;
            cursor: pointer;
            transition: all 0.2s;
        }

        .lang-btn.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        /* Search and Filter */
        .search-box { margin-bottom: 15px; }
        .filter-group { display: flex; gap: 8px; margin-bottom: 15px; flex-wrap: wrap; }
        .filter-btn {
            padding: 8px 14px;
            font-size: 13px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: transparent;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .filter-btn.active { background: var(--primary); color: white; }

        /* Toast Notification */
        .toast {
            position: fixed;
            bottom: 120px;
            right: 20px;
            background: var(--secondary);
            color: white;
            padding: 16px 20px;
            border-radius: 10px;
            box-shadow: var(--shadow);
            animation: slideIn 0.3s ease;
            z-index: 3000;
        }

        @keyframes slideIn { from { transform: translateX(400px); } to { transform: translateX(0); } }

        /* Responsive */
        @media (max-width: 600px) {
            body { padding-bottom: 90px; }
            .input-group { flex-direction: column; }
            input, textarea, select { min-width: auto; }
            .stats-container { grid-template-columns: 1fr; }
            .list-item { flex-wrap: wrap; }
            .action-btns { width: 100%; margin-top: 10px; }
        }
    </style>
</head>
<body class="dark-mode">

                <option value="high">High</option>
                <option value="low">Low</option>
            </select>
            <button class="btn-primary" id="add-task-btn">+ Shto</button>
        </div>

        <div class="filter-group" id="filter-group"></div>

        <div class="search-box">
            <input type="text" id="task-search" placeholder="Kërko detyra...">
        </div>

        <div id="tasks-list"></div>
    </div>

    <!-- Notes Page -->
    <div id="page-notes" class="page">
        <div class="input-group" style="flex-direction: column;">
            <input type="text" id="note-title" placeholder="Titull i shënimit...">
            <textarea id="note-input" rows="4" placeholder="Shkruaj shënimin..."></textarea>
            <input type="text" id="note-tags" placeholder="Tags (ndarë me presje)">
            <button class="btn-primary btn-full" id="add-note-btn">💾 Ruaj Shënimin</button>
        </div>

        <div class="search-box">
            <input type="text" id="note-search" placeholder="Kërko shënime...">
        </div>

        <div id="notes-list"></div>
    </div>

    <!-- Stats Page -->
    <div id="page-stats" class="page">
        <div class="stats-container" id="stats-main"></div>
        <h3 style="margin: 20px 0 15px; font-size: 16px;" id="text-priority-dist"></h3>
        <div class="stats-container" id="stats-priority"></div>

            <p style="font-size: 13px; color: #94a3b8; margin-bottom: 8px;" id="text-storage"></p>
            <div id="storage-info"></div>
        </div>
    </div>

    <!-- Settings Page -->
    <div id="page-settings" class="page">
        <h3 style="margin-bottom: 16px; font-size: 16px;" id="text-select-lang"></h3>
        <div id="lang-buttons"></div>

        <h3 style="margin-top: 24px; margin-bottom: 16px; font-size: 16px;" id="text-data-section"></h3>
        <button class="btn-primary btn-full" id="export-json-btn">📥 Eksporto si JSON</button>
        <button class="btn-primary btn-full" id="export-csv-btn">📊 Eksporto si CSV</button>
        <button class="btn-success btn-full" id="import-btn">📤 Importo Të Dhënat</button>
        <button class="btn-danger btn-full" id="clear-btn">🗑️ Fshi Të Gjitha Të Dhënat</button>

        <input type="file" id="import-file" accept=".json" style="display:none;">
    </div>

    <!-- Bottom Navigation -->
    <div class="bottom-nav" id="bottom-nav"></div>

    <!-- Info Modal -->
    <div id="info-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">

        // ============ UTILITY FUNCTIONS ============
        const Utils = {
            tr(key) {
                return translations[AppState.currentLang]?.[key] || key;
            },
            formatDate(date, locale = 'sq-AL') {
                return new Date(date).toLocaleDateString(locale, { month: 'short', day: 'numeric' });
            },
            showToast(message) {
                const toast = document.createElement('div');
                toast.className = 'toast';
                toast.textContent = message;
                document.body.appendChild(toast);
                setTimeout(() => toast.remove(), 3000);
            }
        };

        // ============ STATE MANAGEMENT ============
        const AppState = {
            tasks: [],
            notes: [],
            currentLang: localStorage.getItem('lang') || 'sq',
            currentTheme: localStorage.getItem('theme') || 'dark',
            currentFilter: 'all',
            editingTaskIndex: null
        };

        // ============ STORAGE ============
        const Storage = {
            saveTasks() {
                localStorage.setItem('tasks', JSON.stringify(AppState.tasks));
            },
            loadTasks() {
                AppState.tasks = JSON.parse(localStorage.getItem('tasks')) || [];
            },
            saveNotes() {
                localStorage.setItem('notes', JSON.stringify(AppState.notes));
            },
            loadNotes() {
                AppState.notes = JSON.parse(localStorage.getItem('notes')) || [];
            },
            getDataSize() {
                const data = JSON.stringify({ tasks: AppState.tasks, notes: AppState.notes });
                return (new Blob([data]).size / 1024).toFixed(2);
            }
        };

        // ============ TASK MANAGER ============
        const TaskManager = {
            add() {
                const input = document.getElementById('task-input');
                const priority = document.getElementById('priority-select').value;
                if (!input.value.trim()) return;

                AppState.tasks.push({
                    text: input.value,
                    priority: priority,
                    completed: false,
                    created: new Date().toISOString()
                });

                input.value = '';
                Storage.saveTasks();
                this.render();
                Utils.showToast(Utils.tr('taskAdded'));
            },
            toggle(index) {
                AppState.tasks[index].completed = !AppState.tasks[index].completed;
                Storage.saveTasks();
                this.render();
            },
            delete(index) {
                if (confirm(Utils.tr('confirmDeleteTask'))) {
                    AppState.tasks.splice(index, 1);
                    Storage.saveTasks();
                    this.render();
                    Utils.showToast(Utils.tr('taskDeleted'));
                }
            },
            getFiltered() {
                let filtered = AppState.tasks;
                if (AppState.currentFilter === 'active') filtered = AppState.tasks.filter(t => !t.completed);
                if (AppState.currentFilter === 'completed') filtered = AppState.tasks.filter(t => t.completed);
                if (AppState.currentFilter === 'today') {
                    const today = new Date().toDateString();
                    filtered = AppState.tasks.filter(t => new Date(t.created).toDateString() === today);
                }
                return filtered;
            },
            render() {
                const list = document.getElementById('tasks-list');
                const filtered = this.getFiltered();
                list.innerHTML = '';

                if (filtered.length === 0) {
                    list.innerHTML = `<p style="text-align:center; color:#94a3b8; padding:20px;">${Utils.tr('noTasks')}</p>`;
                    return;
                }

                filtered.forEach(task => {
                    const realIndex = AppState.tasks.indexOf(task);
                    const item = document.createElement('div');
                    item.className = 'list-item' + (task.completed ? ' completed' : '');
                    item.innerHTML = `
                        <div class="list-item-content" onclick="TaskManager.toggle(${realIndex})" style="cursor:pointer; flex:1;">
                            <input type="checkbox" ${task.completed ? 'checked' : ''} style="margin-right:8px; cursor:pointer;">
                            <span class="priority-badge priority-${task.priority}">🎯 ${task.priority.toUpperCase()}</span>
                            <span>${task.text}</span>
                            <div class="list-item-meta">📅 ${Utils.formatDate(task.created)}</div>
                        </div>
                        <div class="action-btns">
                            <button class="btn-warning btn-sm" onclick="TaskManager.delete(${realIndex})">🗑️</button>
                        </div>
                    `;
                    list.appendChild(item);
                });
                StatsManager.update();
            },
            search(query) {
                const list = document.getElementById('tasks-list');
                const filtered = AppState.tasks.filter(t => t.text.toLowerCase().includes(query.toLowerCase()));
                list.innerHTML = '';

                filtered.forEach(task => {
                    const realIndex = AppState.tasks.indexOf(task);
                    const item = document.createElement('div');
                    item.className = 'list-item' + (task.completed ? ' completed' : '');
                    item.innerHTML = `
                        <div class="list-item-content" onclick="TaskManager.toggle(${realIndex})" style="cursor:pointer; flex:1;">
                            <input type="checkbox" ${task.completed ? 'checked' : ''} style="margin-right:8px;">
                            <span class="priority-badge priority-${task.priority}">🎯</span>
                            <span>${task.text}</span>
                            <div class="list-item-meta">📅 ${Utils.formatDate(task.created)}</div>
                        </div>
                        <div class="action-btns">
                            <button class="btn-danger btn-sm" onclick="TaskManager.delete(${realIndex})">🗑️</button>
                        </div>
                    `;
                    list.appendChild(item);
                });
            }
        };

        // ============ NOTE MANAGER ============
        const NoteManager = {
            add() {
                const title = document.getElementById('note-title');
                const content = document.getElementById('note-input');
                const tags = document.getElementById('note-tags');

                if (!content.value.trim()) return;

                AppState.notes.push({
                    title: title.value || Utils.tr('titleNotes'),
                    content: content.value,
                    tags: tags.value.split(',').map(t => t.trim()).filter(t => t),
                    created: new Date().toISOString()
                });

                title.value = '';
                content.value = '';
                tags.value = '';
                Storage.saveNotes();
                this.render();
                Utils.showToast(Utils.tr('noteAdded'));
            },
            delete(index) {
                if (confirm(Utils.tr('confirmDeleteNote'))) {
                    AppState.notes.splice(index, 1);
                    Storage.saveNotes();
                    this.render();
                    Utils.showToast(Utils.tr('noteDeleted'));
                }
            },
            render() {
                const list = document.getElementById('notes-list');
                list.innerHTML = '';

                if (AppState.notes.length === 0) {
                    list.innerHTML = `<p style="text-align:center; color:#94a3b8; padding:20px;">${Utils.tr('noNotes')}</p>`;
                    return;
                }

                AppState.notes.forEach((note, index) => {
                    const item = document.createElement('div');
                    item.className = 'list-item';
                    item.innerHTML = `
                        <div style="flex:1;">
                            <span style="font-weight:600; display:block; margin-bottom:4px;">${note.title}</span>
                            <span style="display:block; margin-bottom:8px; color:#94a3b8; white-space:pre-wrap;">${note.content.substring(0, 100)}...</span>
                            <div style="display:flex; gap:6px; flex-wrap:wrap; margin-bottom:6px;">
                                ${note.tags.map(tag => `<span style="background:rgba(59,130,246,0.2); color:var(--primary); padding:2px 8px; border-radius:4px; font-size:12px;">#${tag}</span>`).join('')}
                            </div>
                            <div class="list-item-meta">📅 ${Utils.formatDate(note.created)}</div>
                        </div>
                        <div class="action-btns">
                            <button class="btn-danger btn-sm" onclick="NoteManager.delete(${index})">🗑️</button>
                        </div>
                    `;
                    list.appendChild(item);
                });
                StatsManager.update();
            },
            search(query) {
                const list = document.getElementById('notes-list');
                const filtered = AppState.notes.filter(n => 
                    n.title.toLowerCase().includes(query.toLowerCase()) || 
                    n.content.toLowerCase().includes(query.toLowerCase())
                );
                list.innerHTML = '';

                filtered.forEach((note, index) => {
                    const item = document.createElement('div');
                    item.className = 'list-item';
                    item.innerHTML = `
                        <div style="flex:1;">
                            <span style="font-weight:600; display:block;">${note.title}</span>
                            <span style="color:#94a3b8; font-size:13px;">${note.content.substring(0, 80)}...</span>
                        </div>
                        <button class="btn-danger btn-sm" onclick="NoteManager.delete(${index})">🗑️</button>
                    `;
                    list.appendChild(item);
                });
            }
        };

        // ============ STATS MANAGER ============
        const StatsManager = {
            update() {
                const completed = AppState.tasks.filter(t => t.completed).length;
                const total = AppState.tasks.length;
                const percentage = total === 0 ? 0 : Math.round((completed / total) * 100);

                // Render main stats
                const statsMain = document.getElementById('stats-main');
                statsMain.innerHTML = `
                    <div class="stat-card">
                        <div class="stat-label">${Utils.tr('totalTasks')}</div>
                        <div class="stat-number">${total}</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">${Utils.tr('completedTasks')}</div>
                        <div class="stat-number">${completed}</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">${Utils.tr('completionPercent')}</div>
                        <div class="stat-number">${percentage}%</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">${Utils.tr('totalNotes')}</div>
                        <div class="stat-number">${AppState.notes.length}</div>
                    </div>
                `;

                // Render priority stats
                document.getElementById('text-priority-dist').textContent = Utils.tr('priorityDist');
                const statsPriority = document.getElementById('stats-priority');
                statsPriority.innerHTML = `
                    <div class="stat-card">
                        <div class="stat-label">${Utils.tr('priorityHigh')}</div>
                        <div class="stat-number" style="color: #ef4444;">${AppState.tasks.filter(t => t.priority === 'high').length}</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">${Utils.tr('priorityMedium')}</div>
                        <div class="stat-number" style="color: #f59e0b;">${AppState.tasks.filter(t => t.priority === 'medium').length}</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">${Utils.tr('priorityLow')}</div>
                        <div class="stat-number" style="color: #10b981;">${AppState.tasks.filter(t => t.priority === 'low').length}</div>
                    </div>
                `;

                // Storage info
                document.getElementById('text-storage').textContent = Utils.tr('storage');
                document.getElementById('storage-info').innerHTML = `📊 ${Storage.getDataSize()} KB ${Utils.tr('storage').split('💾')[1]}`;
            }
        };

        // ============ UI MANAGER ============
        const UIManager = {
            renderFilterButtons() {
                const filterGroup = document.getElementById('filter-group');
                const filters = [
                    { id: 'all', label: Utils.tr('filterAll') },
                    { id: 'active', label: Utils.tr('filterActive') },
                    { id: 'completed', label: Utils.tr('filterCompleted') },
                    { id: 'today', label: Utils.tr('filterToday') }
                ];

                filterGroup.innerHTML = filters.map(f => 
                    `<button class="filter-btn ${f.id === 'all' ? 'active' : ''}" onclick="UIManager.setFilter('${f.id}')">${f.label}</button>`
                ).join('');
            },
            setFilter(filter) {
                AppState.currentFilter = filter;
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                event.target.classList.add('active');
                TaskManager.render();
            },
            renderLanguageButtons() {
                const langButtons = document.getElementById('lang-buttons');
                const languages = [
                    { code: 'sq', label: Utils.tr('albanianLang') },
                    { code: 'en', label: Utils.tr('englishLang') },
                    { code: 'hr', label: Utils.tr('croatianLang') },
                    { code: 'fr', label: Utils.tr('frenchLang') },
                    { code: 'de', label: Utils.tr('germanLang') },
                    { code: 'it', label: Utils.tr('italianLang') },
                    { code: 'es', label: Utils.tr('spanishLang') }
                ];

                langButtons.innerHTML = languages.map(lang =>
                    `<button class="lang-btn ${lang.code === AppState.currentLang ? 'active' : ''}" data-lang="${lang.code}" onclick="LanguageManager.change('${lang.code}')">${lang.label}</button>`
                ).join('');
            },
            renderBottomNav() {
                const bottomNav = document.getElementById('bottom-nav');
                const navItems = [
                    { id: 'tasks', icon: '📋', label: Utils.tr('navTasks') },
                    { id: 'notes', icon: '📝', label: Utils.tr('navNotes') },
                    { id: 'stats', icon: '📊', label: Utils.tr('navStats') },
                    { id: 'settings', icon: '⚙️', label: Utils.tr('navSettings') }
                ];

                bottomNav.innerHTML = navItems.map((item, idx) =>
                    `<div class="nav-item ${idx === 0 ? 'active' : ''}" onclick="PageManager.switch('${item.id}', this)">
                        <span class="nav-icon">${item.icon}</span>
                        <span>${item.label}</span>
                    </div>`
                ).join('');
            },
            updatePlaceholders() {
                document.getElementById('task-input').placeholder = Utils.tr('taskPlaceholder');
                document.getElementById('note-title').placeholder = Utils.tr('noteTitlePlaceholder');
                document.getElementById('note-input').placeholder = Utils.tr('noteContentPlaceholder');
                document.getElementById('note-tags').placeholder = Utils.tr('noteTagsPlaceholder');
                document.getElementById('task-search').placeholder = Utils.tr('searchTasksPlaceholder');
                document.getElementById('note-search').placeholder = Utils.tr('searchNotesPlaceholder');

                document.getElementById('add-task-btn').textContent = Utils.tr('addTaskBtn');
                document.getElementById('add-note-btn').textContent = Utils.tr('saveNoteBtn');
                document.getElementById('export-json-btn').textContent = Utils.tr('exportJson');
                document.getElementById('export-csv-btn').textContent = Utils.tr('exportCsv');
                document.getElementById('import-btn').textContent = Utils.tr('importData');
                document.getElementById('clear-btn').textContent = Utils.tr('clearData');
                document.getElementById('text-select-lang').textContent = Utils.tr('selectLang');
                document.getElementById('text-data-section').textContent = Utils.tr('dataSection');
            }
        };

        // ============ PAGE MANAGER ============
        const PageManager = {
            switch(pageId) {
                document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
                document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
                document.getElementById('page-' + pageId).classList.add('active');
                event.target.closest('.nav-item').classList.add('active');

                const titles = {
                    tasks: Utils.tr('titleTasks'),
                    notes: Utils.tr('titleNotes'),
                    stats: Utils.tr('titleStats'),
                    settings: Utils.tr('titleSettings')
                };
                document.getElementById('app-title').textContent = titles[pageId] || 'Smart Organizer Pro';

                if (pageId === 'stats') StatsManager.update();
            }
        };

        // ============ LANGUAGE MANAGER ============
        const LanguageManager = {
            change(lang) {
                AppState.currentLang = lang;
                localStorage.setItem('lang', lang);

                document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
                document.querySelector(`[data-lang="${lang}"]`).classList.add('active');

                UIManager.renderFilterButtons();
                UIManager.renderBottomNav();
                UIManager.updatePlaceholders();
                StatsManager.update();
                TaskManager.render();
                NoteManager.render();
                document.getElementById('app-title').textContent = Utils.tr('titleTasks');
            }
        };

        // ============ DATA MANAGER ============
        const DataManager = {
            exportJSON() {
                const data = { tasks: AppState.tasks, notes: AppState.notes, exported: new Date().toISOString() };
                const json = JSON.stringify(data, null, 2);
                const blob = new Blob([json], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `organizer-backup-${new Date().toISOString().split('T')[0]}.json`;
                a.click();
                Utils.showToast(Utils.tr('jsonExported'));
            },
            exportCSV() {
                let csv = 'Teksti,Prioriteti,Statusi,Data\n';
                AppState.tasks.forEach(task => {
                    csv += `"${task.text}","${task.priority}","${task.completed ? 'Kryerë' : 'Aktive'}","${Utils.formatDate(task.created)}"\n`;
                });

                const blob = new Blob([csv], { type: 'text/csv' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `organizer-${new Date().toISOString().split('T')[0]}.csv`;
                a.click();
                Utils.showToast(Utils.tr('csvExported'));
            },
            import() {
                document.getElementById('import-file').click();
            },
            handleImport(event) {
                const file = event.target.files[0];
                const reader = new FileReader();
                reader.onload = (e) => {
                    try {
                        const data = JSON.parse(e.target.result);
                        AppState.tasks = data.tasks || AppState.tasks;
                        AppState.notes = data.notes || AppState.notes;
                        Storage.saveTasks();
                        Storage.saveNotes();
                        TaskManager.render();
                        NoteManager.render();
                        StatsManager.update();
                        Utils.showToast(Utils.tr('dataImported'));
                    } catch (err) {
                        Utils.showToast(Utils.tr('importError'));
                    }
                };
                reader.readAsText(file);
            },
            clearAll() {
                if (confirm(Utils.tr('confirmClearAll'))) {
                    AppState.tasks = [];
                    AppState.notes = [];
                    localStorage.clear();
                    Storage.saveTasks();
                    Storage.saveNotes();
                    TaskManager.render();
                    NoteManager.render();
                    StatsManager.update();
                    Utils.showToast(Utils.tr('dataCleared'));
                }
            }
        };

        // ============ THEME MANAGER ============
        const ThemeManager = {
            toggle() {
                const isDark = document.body.classList.contains('dark-mode');
                document.body.classList.toggle('dark-mode');
                document.body.classList.toggle('light-mode');
                const newTheme = !isDark ? 'dark' : 'light';
                localStorage.setItem('theme', newTheme);
                document.getElementById('theme-btn').textContent = !isDark ? '🌙' : '☀️';
            },
            init() {
                const isDark = AppState.currentTheme === 'dark';
                if (!isDark) {
                    document.body.classList.remove('dark-mode');
                    document.body.classList.add('light-mode');
                    document.getElementById('theme-btn').textContent = '☀️';
                }
            }
        };

        // ============ MODAL MANAGER ============
        const ModalManager = {
            showInfo() {
                document.getElementById('info-modal').classList.add('active');
            },
            close() {
                document.getElementById('info-modal').classList.remove('active');
            }
        };

        // ============ EVENT LISTENERS ============
        document.addEventListener('DOMContentLoaded', () => {
            Storage.loadTasks();
            Storage.loadNotes();
            ThemeManager.init();

            document.getElementById('add-task-btn').addEventListener('click', () => TaskManager.add());
            document.getElementById('add-note-btn').addEventListener('click', () => NoteManager.add());
            document.getElementById('task-input').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') TaskManager.add();
            });
            document.getElementById('task-search').addEventListener('input', (e) => {
                if (e.target.value.trim()) TaskManager.search(e.target.value);
                else TaskManager.render();
            });
            document.getElementById('note-search').addEventListener('input', (e) => {
                if (e.target.value.trim()) NoteManager.search(e.target.value);
                else NoteManager.render();
            });

            document.getElementById('theme-btn').addEventListener('click', () => ThemeManager.toggle());
            document.getElementById('info-btn').addEventListener('click', () => ModalManager.showInfo());
            document.getElementById('modal-close').addEventListener('click', () => ModalManager.close());

            document.getElementById('export-json-btn').addEventListener('click', () => DataManager.exportJSON());
            document.getElementById('export-csv-btn').addEventListener('click', () => DataManager.exportCSV());
            document.getElementById('import-btn').addEventListener('click', () => DataManager.import());
            document.getElementById('import-file').addEventListener('change', (e) => DataManager.handleImport(e));
            document.getElementById('clear-btn').addEventListener('click', () => DataManager.clearAll());

            UIManager.renderFilterButtons();
            UIManager.renderLanguageButtons();
            UIManager.renderBottomNav();
            UIManager.updatePlaceholders();
            TaskManager.render();
            NoteManager.render();
            StatsManager.update();
            LanguageManager.change(AppState.currentLang);
        });

        // Close modal when clicking outside
        document.getElementById('info-modal').addEventListener('click', (e) => {
            if (e.target === document.getElementById('info-modal')) {
                ModalManager.close();
            }
        });
    </script>
</body>
</html>
