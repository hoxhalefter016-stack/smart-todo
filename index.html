<!DOCTYPE html>
<html lang="sq">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Smart Organizer Pro</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f6f5f2;
  --surface: #ffffff;
  --surface2: #f0ede8;
  --border: #e2ddd7;
  --text: #1a1714;
  --text2: #7a7068;
  --text3: #b0a89e;
  --accent: #c17f3c;
  --accent-light: #f5ede0;
  --accent2: #3c6bc1;
  --accent2-light: #e0eaf5;
  --danger: #c13c3c;
  --danger-light: #fde8e8;
  --success: #3ca06b;
  --pro: #7c4dca;
  --pro-light: #f0e8ff;
  --shadow: 0 1px 4px rgba(0,0,0,0.07), 0 4px 16px rgba(0,0,0,0.04);
  --shadow-lg: 0 8px 32px rgba(0,0,0,0.12);
  --radius: 14px;
  --radius-sm: 8px;
  --nav-height: 76px;
  --header-height: 56px;
  --font: 'DM Sans', sans-serif;
  --font-display: 'DM Serif Display', serif;
  --transition: 0.18s cubic-bezier(0.4,0,0.2,1);
}
[data-theme="dark"] {
  --bg: #141210;
  --surface: #1e1c19;
  --surface2: #28251f;
  --border: #353028;
  --text: #f0ece6;
  --text2: #998d80;
  --text3: #5a5048;
  --accent-light: #2e1f0a;
  --accent2-light: #0a1e35;
  --danger-light: #2a0a0a;
  --pro-light: #1a0e2e;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding-bottom: var(--nav-height);
  -webkit-font-smoothing: antialiased;
  transition: background var(--transition), color var(--transition);
}
header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  height: var(--header-height);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 18px;
  position: sticky;
  top: 0;
  z-index: 200;
  transition: background var(--transition), border-color var(--transition);
}
.header-title {
  font-family: var(--font-display);
  font-size: 19px;
  color: var(--text);
  letter-spacing: -0.3px;
}
.header-pro-badge {
  background: linear-gradient(135deg, var(--pro), #9c6de8);
  color: #fff;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.8px;
  padding: 3px 7px;
  border-radius: 20px;
  text-transform: uppercase;
  display: none;
}
.header-pro-badge.visible { display: inline-block; }
.header-right { display: flex; align-items: center; gap: 10px; }
.page { display: none; padding: 18px; animation: fadeIn 0.2s ease; }
.page.active { display: block; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
.section-label {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.8px;
  text-transform: uppercase;
  color: var(--text3);
  margin-bottom: 10px;
  margin-top: 4px;
}
.add-task-form {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px;
  margin-bottom: 18px;
  box-shadow: var(--shadow);
  display: flex;
  flex-direction: column;
  gap: 10px;
  transition: background var(--transition), border-color var(--transition);
}
.add-task-form input[type="text"] {
  width: 100%;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 11px 14px;
  font-size: 15px;
  font-family: var(--font);
  color: var(--text);
  outline: none;
  transition: border-color var(--transition), background var(--transition);
}
.add-task-form input[type="text"]:focus { border-color: var(--accent); }
.add-task-form input[type="text"]::placeholder { color: var(--text3); }
.form-row {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}
.form-row select {
  flex: 1;
  min-width: 0;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 10px 12px;
  font-size: 14px;
  font-family: var(--font);
  color: var(--text);
  outline: none;
  cursor: pointer;
  transition: border-color var(--transition), background var(--transition);
  -webkit-appearance: none;
}
.form-row select:focus { border-color: var(--accent); }
.due-date-input {
  flex: 1;
  min-width: 120px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 10px 12px;
  font-size: 14px;
  font-family: var(--font);
  color: var(--text);
  outline: none;
  position: relative;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 6px;
  transition: border-color var(--transition), background var(--transition);
}
.due-date-input.pro-locked { opacity: 0.55; cursor: pointer; }
.due-date-input:focus { border-color: var(--accent); }
input[type="datetime-local"] {
  flex: 1;
  min-width: 120px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 10px 12px;
  font-size: 13px;
  font-family: var(--font);
  color: var(--text);
  outline: none;
  cursor: pointer;
  transition: border-color var(--transition), background var(--transition);
  -webkit-appearance: none;
  color-scheme: light dark;
}
input[type="datetime-local"]:focus { border-color: var(--accent); }
