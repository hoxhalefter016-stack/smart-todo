<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Smart Organizer Pro</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        
        body { 
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            color: #f8fafc; 
            min-height: 100vh;
            padding-bottom: 90px;
            transition: background 0.3s ease;
        }

        body.light-mode {
            background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
            color: #0f172a;
        }
        
        header { 
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            color: #38bdf8; 
            padding: 16px 20px; 
            text-align: center; 
            font-size: 20px; 
            font-weight: 700;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        body.light-mode header {
            background: rgba(15, 23, 42, 0.05);
            border-bottom-color: rgba(15, 23, 42, 0.1);
        }
        
        .page { display: none; padding: 20px; animation: fadeIn 0.4s ease-out; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .input-group { display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
        input, textarea, select { 
            flex: 1; 
            min-width: 150px;
            padding: 12px 16px; 
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1); 
            border-radius: 10px; 
            font-size: 14px; 
            color: #f8fafc;
            outline: none;
            transition: all 0.3s;
        }

        body.light-mode input,
        body.light-mode textarea,
        body.light-mode select {
            background: #ffffff;
            border-color: #cbd5e1;
            color: #0f172a;
        }

        input:focus, textarea:focus, select:focus {
            border-color: #38bdf8;
            box-shadow: 0 0 12px rgba(56, 189, 248, 0.3);
            background: rgba(255, 255, 255, 0.08);
        }

        body.light-mode input:focus,
        body.light-mode textarea:focus,
        body.light-mode select:focus {
            border-color: #0f172a;
            background: #f1f5f9;
            box-shadow: 0 0 12px rgba(15, 23, 42, 0.15);
        }

        input::placeholder, textarea::placeholder { color: #94a3b8; }

        button { 
            background: linear-gradient(135deg, #10b981 0%, #059669 100%); 
            color: white; 
            border: none; 
            padding: 12px 20px; 
            border-radius: 10px; 
            cursor: pointer; 
            font-weight: 600; 
            font-size: 14px;
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.2);
            transition: all 0.2s;
            user-select: none;
        }

        button:hover { transform: translateY(-2px); box-shadow: 0 6px 16px rgba(16, 185, 129, 0.3); }
        button:active { transform: scale(0.95); }

        .btn-primary { background: linear-gradient(135deg, #0ea5e9 0%, #2563eb 100%); box-shadow: 0 4px 12px rgba(14, 165, 233, 0.2); }
        .btn-danger { background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%); box-shadow: 0 4px 12px rgba(239, 68, 68, 0.2); }
        .btn-warning { background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%); box-shadow: 0 4px 12px rgba(245, 158, 11, 0.2); }
        .btn-small { padding: 6px 12px; font-size: 13px; }
        .btn-block { width: 100%; margin-top: 10px; }

        .list-item { 
            background: rgba(255, 255, 255, 0.03); 
            padding: 16px; 
            border-radius: 12px; 
            margin-bottom: 12px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            transition: all 0.3s ease;
            gap: 12px;
        }

        body.light-mode .list-item {
            background: #ffffff;
            border-color: #e2e8f0;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .list-item:hover { transform: translateY(-2px); box-shadow: 0 6px 24px rgba(56, 189, 248, 0.15); }
        
        .list-item.completed { 
            background: rgba(16, 185, 129, 0.1); 
            border-left: 4px solid #10b981;
        }

        body.light-mode .list-item.completed {
            background: #f0fdf4;
            border-color: #d1fae5;
        }

        .list-item.completed span { color: #a7f3d0; text-decoration: line-through; }

        .list-item.priority-high { border-left: 4px solid #ef4444; }
        .list-item.priority-medium { border-left: 4px solid #f59e0b; }
        .list-item.priority-low { border-left: 4px solid #10b981; }

        .task-content { flex: 1; min-width: 0; }
        .task-meta { font-size: 12px; color: #94a3b8; margin-top: 4px; }
        .task-date { display: inline-block; margin-right: 8px; }
        .task-priority { display: inline-block; padding: 2px 6px; border-radius: 4px; font-size: 11px; font-weight: 600; }
        .task-priority-high { background: rgba(239, 68, 68, 0.2); color: #fca5a5; }
        .task-priority-medium { background: rgba(245, 158, 11, 0.2); color: #fbbf24; }
        .task-priority-low { background: rgba(16, 185, 129, 0.2); color: #a7f3d0; }

        .action-btns { display: flex; gap: 6px; flex-shrink: 0; }
        .edit-btn { background: rgba(245, 158, 11, 0.15); color: #fbbf24; border: 1px solid rgba(245, 158, 11, 0.3); }
        .delete-btn { background: rgba(239, 68, 68, 0.15); color: #fca5a5; border: 1px solid rgba(239, 68, 68, 0.3); }

        .bottom-nav { 
            position: fixed; 
            bottom: 0; 
            left: 0; 
            width: 100%; 
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(15px);
            display: flex; 
            border-top: 1px solid rgba(255, 255, 255, 0.08); 
            box-shadow: 0 -4px 24px rgba(0,0,0,0.3); 
            padding: 8px 0;
            z-index: 1000;
        }

        body.light-mode .bottom-nav {
            background: rgba(255, 255, 255, 0.95);
            border-top-color: rgba(15, 23, 42, 0.1);
        }

        .nav-item { 
            flex: 1; 
            text-align: center; 
            padding: 10px 8px; 
            color: #94a3b8; 
            cursor: pointer; 
            font-size: 12px; 
            font-weight: 500; 
            transition: all 0.3s;
            user-select: none;
        }

        .nav-item.active { color: #38bdf8; transform: translateY(-2px); }
        body.light-mode .nav-item.active { color: #0f172a; }

        .nav-icon { font-size: 20px; display: block; margin-bottom: 4px; }

        .stats-container { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .stat-card { 
            background: rgba(255, 255, 255, 0.03); 
            padding: 20px; 
            border-radius: 12px; 
            text-align: center; 
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        body.light-mode .stat-card {
            background: #ffffff;
            border-color: #e2e8f0;
        }

        .stat-number { font-size: 32px; font-weight: 700; color: #38bdf8; margin-top: 8px; }
        .stat-label { color: #94a3b8; font-size: 13px; }

        .lang-btn { 
            width: 100%; 
            padding: 12px 16px; 
            margin-bottom: 10px; 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            border-radius: 10px; 
            background: rgba(255, 255, 255, 0.03); 
            color: #e2e8f0;
            font-size: 15px; 
            font-weight: 500; 
            text-align: left;
            cursor: pointer;
            transition: all 0.2s;
            user-select: none;
        }

        body.light-mode .lang-btn {
            background: #ffffff;
            border-color: #cbd5e1;
            color: #334155;
        }

        .lang-btn.active { 
            background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%); 
            color: white; 
            border-color: #3b82f6; 
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
        }

        .empty-state { 
            text-align: center; 
            padding: 40px 20px; 
            color: #94a3b8; 
        }

        .empty-state-icon { font-size: 48px; margin-bottom: 16px; }
        .empty-state-text { font-size: 16px; font-weight: 500; }

        .modal {
            display: none;
            position: fixed;
            z-index: 2000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(5px);
        }

        .modal.active { display: flex; align-items: center; justify-content: center; }

        .modal-content {
            background: #0f172a;
            padding: 24px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            max-width: 500px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
        }

        body.light-mode .modal-content {
            background: #ffffff;
            border-color: #cbd5e1;
        }

        .modal-title { 
            font-size: 18px; 
            font-weight: 700; 
            margin-bottom: 16px; 
            color: #f8fafc; 
        }

        body.light-mode .modal-title { color: #0f172a; }

        .modal-buttons { display: flex; gap: 10px; margin-top: 20px; }
        .modal-buttons button { flex: 1; }

        .tag-input { display: flex; gap: 6px; flex-wrap: wrap; margin: 10px 0; }
        .tag { 
            background: rgba(56, 189, 248, 0.2); 
            color: #38bdf8; 
            padding: 4px 10px; 
            border-radius: 16px; 
            font-size: 12px; 
            font-weight: 500;
            cursor: pointer;
            border: 1px solid rgba(56, 189, 248, 0.3);
        }

        .tab-buttons { display: flex; gap: 8px; margin-bottom: 20px; border-bottom: 1px solid rgba(255, 255, 255, 0.1); }
        .tab-button { padding: 10px 16px; background: none; border: none; color: #94a3b8; border-bottom: 2px solid transparent; cursor: pointer; font-weight: 500; }
        .tab-button.active { color: #38bdf8; border-bottom-color: #38bdf8; }

        .search-box {
            width: 100%;
            margin-bottom: 16px;
        }

        @media (max-width: 480px) {
            .input-group { gap: 8px; }
            input, textarea { font-size: 16px; }
            .stats-container { grid-template-columns: 1fr; }
            .modal-content { width: 95%; }
        }
    </style>
</head>
<body>
    <header id="app-title">Detyrat Ditore</header>

    <div id="page-tasks" class="page active">
        <div class="input-group">
            <input type="text" id="task-input" placeholder="Shto një detyrë të re...">
            <select id="task-priority">
                <option value="low">📊 Të Ulët</option>
                <option value="medium" selected>📌 Medium</option>
                <option value="high">🔴 Të Larta</option>
            </select>
            <button onclick="addTask()">Shto</button>
        </div>

        <div class="tab-buttons">
            <button class="tab-button active" onclick="filterTasks('all')">Të Gjitha</button>
            <button class="tab-button" onclick="filterTasks('active')">Aktive</button>
            <button class="tab-button" onclick="filterTasks('completed')">Të Kryera</button>
        </div>

        <input type="text" id="search-tasks" class="search-box" placeholder="🔍 Kërko detyra...">
        <div id="tasks-list"></div>
    </div>

    <div id="page-notes" class="page">
        <div class="input-group" style="flex-direction: column;">
            <input type="text" id="note-title" placeholder="Titulli i shënimit...">
            <textarea id="note-input" rows="4" placeholder="Shkruaj shënimin..."></textarea>
            <input type="text" id="note-tags" placeholder="Etiketat (nda me presje)">
            <button onclick="addNote()" class="btn-primary btn-block">Ruaj Shënimin</button>
        </div>

        <input type="text" id="search-notes" class="search-box" placeholder="🔍 Kërko shënime...">
        <div id="notes-list"></div>
    </div>

    <div id="page-stats" class="page">
        <div class="stats-container">
            <div class="stat-card">
                <div class="stat-label" id="text-total-tasks">Gjithsej Detyra</div>
                <div class="stat-number" id="total-tasks-count">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label" id="text-done-tasks">Të Kryera</div>
                <div class="stat-number" id="completed-tasks-count">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label" id="text-total-notes">Shënime</div>
                <div class="stat-number" id="total-notes-count">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">% Përfunduar</div>
                <div class="stat-number" id="completion-percent">0%</div>
            </div>
        </div>

        <div class="stat-card" style="margin-top: 20px;">
            <div class="stat-label">Përparimi i Këtyre 7 Ditëve</div>
            <div id="weekly-chart" style="display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; margin-top: 16px;"></div>
        </div>

        <div style="margin-top: 20px;">
            <button onclick="exportData('json')" class="btn-primary btn-small">📥 Eksporto JSON</button>
            <button onclick="exportData('csv')" class="btn-primary btn-small">📊 Eksporto CSV</button>
            <button onclick="openImportModal()" class="btn-warning btn-small">📤 Importo</button>
            <button onclick="clearAllData()" class="btn-danger btn-small">🗑️ Fshi të Gjitha</button>
        </div>
    </div>

    <div id="page-settings" class="page">
        <div style="margin-bottom: 24px;">
            <h3 style="margin-bottom: 12px; font-size: 16px; font-weight: 600;">🌓 Temë</h3>
            <button onclick="toggleTheme()" class="btn-primary btn-block">☀️ Ndërro Temën (Këmundë/Drita)</button>
        </div>

        <div style="margin-bottom: 24px;">
            <h3 style="margin-bottom: 12px; font-size: 16px; font-weight: 600;" id="text-select-lang">Zgjidh Gjuhën</h3>
            <button class="lang-btn" onclick="changeLanguage('sq')">🇦🇱 Shqip</button>
            <button class="lang-btn" onclick="changeLanguage('en')">🇬🇧 English</button>
            <button class="lang-btn" onclick="changeLanguage('hr')">🇭🇷 Hrvatski</button>
            <button class="lang-btn" onclick="changeLanguage('fr')">🇫🇷 Français</button>
            <button class="lang-btn" onclick="changeLanguage('de')">🇩🇪 Deutsch</button>
            <button class="lang-btn" onclick="changeLanguage('it')">🇮🇹 Italiano</button>
            <button class="lang-btn" onclick="changeLanguage('es')">🇪🇸 Español</button>
        </div>

        <div style="background: rgba(255,255,255,0.03); padding: 16px; border-radius: 10px; margin-top: 20px;">
            <div style="font-size: 12px; color: #94a3b8; line-height: 1.6;">
                <p><strong>📱 Smart Organizer Pro v2.0</strong></p>
                <p style="margin-top: 8px;">Aplikacion profesional për menaxhimin e detyrave dhe shënimeve.</p>
                <p style="margin-top: 8px;"><span id="storage-info">Hapësira e përdorur: 0 KB</span></p>
            </div>
        </div>
    </div>

    <div class="bottom-nav">
        <div class="nav-item active" onclick="switchPage('tasks', this)">
            <span class="nav-icon">📋</span><span id="nav-text-tasks">Detyrat</span>
        </div>
        <div class="nav-item" onclick="switchPage('notes', this)">
            <span class="nav-icon">📝</span><span id="nav-text-notes">Shënim</span>
        </div>
        <div class="nav-item" onclick="switchPage('stats', this)">
            <span class="nav-icon">📊</span><span id="nav-text-stats">Ecuria</span>
        </div>
        <div class="nav-item" onclick="switchPage('settings', this)">
            <span class="nav-icon">⚙️</span><span id="nav-text-settings">Cilësime</span>
        </div>
    </div>

    <div id="import-modal" class="modal">
        <div class="modal-content">
            <h2 class="modal-title">📤 Importo të Dhënat</h2>
            <textarea id="import-data" rows="6" placeholder="Ngjit JSON të eksportuar këtu..."></textarea>
            <div class="modal-buttons">
                <button onclick="importData()" class="btn-primary">✓ Importo</button>
                <button onclick="closeModal('import-modal')" class="btn-danger">✕ Anulo</button>
            </div>
        </div>
    </div>

                btnDelete: "Eliminar",
                btnEdit: "Editar",
                navTasks: "Tareas",
                navNotes: "Notas",
                navStats: "Progreso",
                navSettings: "Ajustes",
                totalTasks: "Total de Tareas",
                completedTasks: "Completadas",
                totalNotes: "Total de Notas",
                priorityHigh: "Prioridad Alta",
                priorityMedium: "Prioridad Media",
                priorityLow: "Prioridad Baja",
                noTasks: "Sin tareas",
                noNotes: "Sin notas",
                confirmDelete: "¿Estás seguro?",
                selectLang: "Seleccionar Idioma"
            }
        };

        function switchPage(pageId, element) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            
            document.getElementById('page-' + pageId).classList.add('active');
            element.classList.add('active');
            
            const data = translations[currentLang];
            const titles = {
                tasks: data.titleTasks,
                notes: data.titleNotes,
                stats: data.titleStats,
                settings: data.titleSettings
            };
            document.getElementById('app-title').innerText = titles[pageId] || 'Smart Organizer';
            
            if (pageId === 'stats') updateStats();
            updateStorageInfo();
        }

        function renderTasks() {
            const list = document.getElementById('tasks-list');
            let filtered = tasks;

            if (taskFilter === 'active') filtered = tasks.filter(t => !t.completed);
            if (taskFilter === 'completed') filtered = tasks.filter(t => t.completed);
            
            if (taskSearch) {
                filtered = filtered.filter(t => t.text.toLowerCase().includes(taskSearch.toLowerCase()));
            }

            if (filtered.length === 0) {
                list.innerHTML = `<div class="empty-state"><div class="empty-state-icon">📭</div><div class="empty-state-text">${translations[currentLang].noTasks}</div></div>`;
                return;
            }

            list.innerHTML = '';
            filtered.forEach((task, index) => {
                const actualIndex = tasks.indexOf(task);
                const item = document.createElement('div');
                item.className = 'list-item' + (task.completed ? ' completed' : '') + (task.priority ? ' priority-' + task.priority : '');
                
                const date = new Date(task.created || new Date()).toLocaleDateString(currentLang === 'sq' ? 'sq-AL' : 'en-US');
                
                item.innerHTML = `
                    <div style="flex: 1; min-width: 0;">
                        <div style="cursor:pointer; font-size:15px; word-break: break-word;" onclick="toggleTask(${actualIndex})">${task.text}</div>
                        <div class="task-meta">
                            <span class="task-date">${date}</span>
                            <span class="task-priority task-priority-${task.priority || 'low'}">${task.priority ? task.priority.toUpperCase() : 'LOW'}</span>
                        </div>
                    </div>
                    <div class="action-btns">
                        <button class="edit-btn btn-small" onclick="editTask(${actualIndex})">✏️</button>
                        <button class="delete-btn btn-small" onclick="deleteTask(${actualIndex})">✕</button>
                    </div>
                `;
                list.appendChild(item);
            });
            localStorage.setItem('tasks', JSON.stringify(tasks));
            updateStats();
        }

        function addTask() {
            const input = document.getElementById('task-input');
            const priority = document.getElementById('task-priority').value;
            if (input.value.trim() === '') return;
            
            if (editingTaskIndex !== null) {
                tasks[editingTaskIndex].text = input.value;
                tasks[editingTaskIndex].priority = priority;
                editingTaskIndex = null;
            } else {
                tasks.push({ 
                    text: input.value, 
                    completed: false,
                    priority: priority,
                    created: new Date().toISOString()
                });
            }
            input.value = '';
            renderTasks();
        }

        function editTask(index) {
            document.getElementById('task-input').value = tasks[index].text;
            document.getElementById('task-priority').value = tasks[index].priority || 'medium';
            editingTaskIndex = index;
            window.scrollTo(0, 0);
        }

        function toggleTask(index) {
            tasks[index].completed = !tasks[index].completed;
            renderTasks();
        }

        function deleteTask(index) {
            if (confirm(translations[currentLang].confirmDelete)) {
                tasks.splice(index, 1);
                renderTasks();
            }
        }

        function filterTasks(filter) {
            taskFilter = filter;
            document.querySelectorAll('.tab-button').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            renderTasks();
        }

        document.getElementById('search-tasks')?.addEventListener('input', (e) => {
            taskSearch = e.target.value;
            renderTasks();
        });

        function renderNotes() {
            const list = document.getElementById('notes-list');
            let filtered = notes;

            if (noteSearch) {
                filtered = filtered.filter(n => 
                    (n.title?.toLowerCase() || '').includes(noteSearch.toLowerCase()) ||
                    (n.text?.toLowerCase() || '').includes(noteSearch.toLowerCase())
                );
            }

            if (filtered.length === 0) {
                list.innerHTML = `<div class="empty-state"><div class="empty-state-icon">📭</div><div class="empty-state-text">${translations[currentLang].noNotes}</div></div>`;
                return;
            }

            list.innerHTML = '';
            filtered.forEach((note, index) => {
                const actualIndex = notes.indexOf(note);
                const item = document.createElement('div');
                item.className = 'list-item';
                
                const date = new Date(note.created || new Date()).toLocaleDateString();
                
                item.innerHTML = `
                    <div style="flex: 1; min-width: 0;">
                        <div style="font-weight: 600; font-size: 15px; word-break: break-word;">${note.title || 'Shënim pa titull'}</div>
                        <div style="font-size: 14px; color: #94a3b8; margin-top: 4px; word-break: break-word;">${note.text?.substring(0, 50) || ''}${note.text?.length > 50 ? '...' : ''}</div>
                        <div class="task-meta">${date}</div>
                    </div>
                    <div class="action-btns">
                        <button class="edit-btn btn-small" onclick="editNote(${actualIndex})">✏️</button>
                        <button class="delete-btn btn-small" onclick="deleteNote(${actualIndex})">✕</button>
                    </div>
                `;
                list.appendChild(item);
            });
            localStorage.setItem('notes', JSON.stringify(notes));
            updateStats();
        }

        function addNote() {
            const input = document.getElementById('note-input');
            const title = document.getElementById('note-title');
            if (input.value.trim() === '') return;
            
            if (editingNoteIndex !== null) {
                notes[editingNoteIndex] = {
                    title: title.value,
                    text: input.value,
                    tags: document.getElementById('note-tags').value.split(',').map(t => t.trim()),
                    created: notes[editingNoteIndex].created
                };
                editingNoteIndex = null;
            } else {
                notes.push({
                    title: title.value,
                    text: input.value,
                    tags: document.getElementById('note-tags').value.split(',').map(t => t.trim()),
                    created: new Date().toISOString()
                });
            }
            input.value = '';
            title.value = '';
            document.getElementById('note-tags').value = '';
            renderNotes();
        }

        function editNote(index) {
            document.getElementById('note-title').value = notes[index].title || '';
            document.getElementById('note-input').value = notes[index].text;
            document.getElementById('note-tags').value = (notes[index].tags || []).join(', ');
            editingNoteIndex = index;
            window.scrollTo(0, 0);
        }

        function deleteNote(index) {
            if (confirm(translations[currentLang].confirmDelete)) {
                notes.splice(index, 1);
                renderNotes();
            }
        }

        document.getElementById('search-notes')?.addEventListener('input', (e) => {
            noteSearch = e.target.value;
            renderNotes();
        });

        function updateStats() {
            const total = tasks.length;
            const completed = tasks.filter(t => t.completed).length;
            const percent = total === 0 ? 0 : Math.round((completed / total) * 100);

            document.getElementById('total-tasks-count').innerText = total;
            document.getElementById('completed-tasks-count').innerText = completed;
            document.getElementById('total-notes-count').innerText = notes.length;
            document.getElementById('completion-percent').innerText = percent + '%';

            const weekChart = document.getElementById('weekly-chart');
            if (weekChart) {
                weekChart.innerHTML = '';
                for (let i = 6; i >= 0; i--) {
                    const date = new Date();
                    date.setDate(date.getDate() - i);
                    const count = tasks.filter(t => new Date(t.created || new Date()).toDateString() === date.toDateString()).length;
                    const bar = document.createElement('div');
                    bar.style.cssText = `background: linear-gradient(180deg, #38bdf8 0%, #0ea5e9 100%); height: ${Math.max(count * 20, 30)}px; border-radius: 6px; cursor: pointer; font-size: 10px; display: flex; align-items: flex-end; justify-content: center; color: white; font-weight: 600;`;
                    bar.innerText = count;
                    weekChart.appendChild(bar);
                }
            }
        }

        function exportData(format) {
            const data = { tasks, notes, exportDate: new Date().toISOString() };
            
            if (format === 'json') {
                const json = JSON.stringify(data, null, 2);
                downloadFile(json, 'smart-organizer-backup.json', 'application/json');
            } else if (format === 'csv') {
                let csv = 'Type,Title,Content,Priority,Completed,Date\n';
                tasks.forEach(t => {
                    csv += `Task,"${t.text.replace(/"/g, '""')}","",${t.priority || 'N/A'},${t.completed},${t.created || ''}\n`;
                });
                notes.forEach(n => {
                    csv += `Note,"${n.title?.replace(/"/g, '""') || ''}","${n.text?.replace(/"/g, '""') || ''}","",N/A,${n.created || ''}\n`;
                });
                downloadFile(csv, 'smart-organizer-backup.csv', 'text/csv');
            }
        }

        function downloadFile(content, filename, type) {
            const blob = new Blob([content], { type });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            a.click();
            URL.revokeObjectURL(url);
        }

        function openImportModal() {
            document.getElementById('import-modal').classList.add('active');
        }

        function closeModal(modalId) {
            document.getElementById(modalId).classList.remove('active');
        }

        function importData() {
            const input = document.getElementById('import-data').value;
            try {
                const data = JSON.parse(input);
                tasks = data.tasks || [];
                notes = data.notes || [];
                localStorage.setItem('tasks', JSON.stringify(tasks));
                localStorage.setItem('notes', JSON.stringify(notes));
                alert('✓ Të dhënat u importuan me sukses!');
                closeModal('import-modal');
                renderTasks();
                renderNotes();
                updateStats();
            } catch (e) {
                alert('✕ Gabim në importimin e të dhënave. Verifikoni formatin JSON.');
            }
        }

        function clearAllData() {
            if (confirm('🚨 A jeni i sigurt? Kjo do të fshijë të gjitha të dhënat!')) {
                tasks = [];
                notes = [];
                localStorage.removeItem('tasks');
                localStorage.removeItem('notes');
                renderTasks();
                renderNotes();
                updateStats();
                alert('✓ Të gjitha të dhënat u fshinë.');
            }
        }

        function changeLanguage(lang) {
            currentLang = lang;
            localStorage.setItem('lang', lang);
            
            document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('lang-' + lang)?.classList.add('active');
            
            const d = translations[lang];
            const activePageId = document.querySelector('.page.active')?.id.replace('page-','');
            
            const titles = {
                tasks: d.titleTasks,
                notes: d.titleNotes,
                stats: d.titleStats,
                settings: d.titleSettings
            };
            document.getElementById('app-title').innerText = titles[activePageId] || 'Smart Organizer';
            
            document.getElementById('task-input').placeholder = d.placeholderTask;
            document.getElementById('note-input').placeholder = d.placeholderNote;
            document.getElementById('text-select-lang').innerText = d.selectLang;
            
            document.getElementById('nav-text-tasks').innerText = d.navTasks;
            document.getElementById('nav-text-notes').innerText = d.navNotes;
            document.getElementById('nav-text-stats').innerText = d.navStats;
            document.getElementById('nav-text-settings').innerText = d.navSettings;
        }

        function toggleTheme() {
            currentTheme = currentTheme === 'dark' ? 'light' : 'dark';
            localStorage.setItem('theme', currentTheme);
            document.body.classList.toggle('light-mode');
        }

        function updateStorageInfo() {
            const size = JSON.stringify(tasks).length + JSON.stringify(notes).length;
            const kb = (size / 1024).toFixed(2);
            document.getElementById('storage-info').innerText = `💾 Hapësira e përdorur: ${kb} KB`;
        }

        // Initialize
        if (currentTheme === 'light') document.body.classList.add('light-mode');
        renderTasks();
        renderNotes();
        changeLanguage(currentLang);
        updateStats();
        updateStorageInfo();

        document.getElementById('lang-' + currentLang)?.classList.add('active');
    </script>
</body>
</html>
