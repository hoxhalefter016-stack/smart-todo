<!DOCTYPE html>
<html lang="sq">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MindList Pro</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:system-ui,sans-serif;
}

:root{
    --bg:#f8fafc;
    --card:#ffffff;
    --text:#0f172a;
    --border:#e2e8f0;
    --primary:#2563eb;
    --danger:#dc2626;
    --success:#16a34a;
}

body.dark{
    --bg:#0f172a;
    --card:#1e293b;
    --text:#f8fafc;
    --border:#334155;
}

body{
    background:var(--bg);
    color:var(--text);
    transition:.25s;
    min-height:100vh;
    padding-bottom:100px;
}

header{
    position:sticky;
    top:0;
    background:var(--card);
    border-bottom:1px solid var(--border);
    padding:16px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    z-index:100;
}

.container{
    padding:20px;
}

.input-group{
    display:flex;
    gap:10px;
    margin-bottom:20px;
    flex-wrap:wrap;
}

input,select{
    flex:1;
    min-width:180px;
    padding:12px;
    border-radius:10px;
    border:1px solid var(--border);
    background:var(--card);
    color:var(--text);
}

button{
    border:none;
    border-radius:10px;
    padding:12px 18px;
    cursor:pointer;
    font-weight:600;
}

.btn-primary{
    background:var(--primary);
    color:white;
}

.btn-danger{
    background:var(--danger);
    color:white;
}

.task{
    background:var(--card);
    border:1px solid var(--border);
    border-radius:12px;
    padding:14px;
    margin-bottom:12px;
    display:flex;
    align-items:center;
    gap:12px;
}

.task.completed .task-text{
    text-decoration:line-through;
    opacity:.6;
}

.task-text{
    flex:1;
    word-break:break-word;
}

.priority{
    padding:4px 10px;
    border-radius:20px;
    font-size:12px;
    font-weight:700;
}

.high{
    background:#fee2e2;
    color:#dc2626;
}

.medium{
    background:#fef3c7;
    color:#d97706;
}

.low{
    background:#dcfce7;
    color:#16a34a;
}

.empty{
    text-align:center;
    opacity:.6;
    margin-top:30px;
}

.stats{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:12px;
    margin-top:20px;
}

.card{
    background:var(--card);
    border:1px solid var(--border);
    border-radius:12px;
    padding:20px;
}

.card h3{
    font-size:14px;
    opacity:.7;
    margin-bottom:10px;
}

.card p{
    font-size:28px;
    font-weight:700;
}

.theme-btn{
    background:transparent;
    border:1px solid var(--border);
    color:var(--text);
}

@media(max-width:600px){
    .stats{
        grid-template-columns:1fr;
    }
}
</style>
</head>

<body>

<header>
    <h2>MindList Pro</h2>

    <button id="themeBtn" class="theme-btn">
        🌙
    </button>
</header>

<div class="container">

    <div class="input-group">

        <input 
            type="text"
            id="taskInput"
            maxlength="120"
            placeholder="Shto detyrë..."
            aria-label="Task Input"
        >

        <select id="prioritySelect">

            <option value="high">High</option>
            <option value="medium" selected>Medium</option>
            <option value="low">Low</option>

        </select>

        <button id="addBtn" class="btn-primary">
            Shto
        </button>

    </div>

    <div id="taskList"></div>

    <div class="stats">

        <div class="card">
            <h3>Detyra Totale</h3>
            <p id="totalTasks">0</p>
        </div>

        <div class="card">
            <h3>Të Kryera</h3>
            <p id="completedTasks">0</p>
        </div>

    </div>

</div>

<script>

const state = {
    tasks: loadTasks()
};

const taskInput = document.getElementById('taskInput');
const prioritySelect = document.getElementById('prioritySelect');
const addBtn = document.getElementById('addBtn');
const taskList = document.getElementById('taskList');
const totalTasks = document.getElementById('totalTasks');
const completedTasks = document.getElementById('completedTasks');
const themeBtn = document.getElementById('themeBtn');

init();

function init(){

    loadTheme();

    renderTasks();

    addBtn.addEventListener('click', addTask);

    taskInput.addEventListener('keypress', e => {

        if(e.key === 'Enter'){
            addTask();
        }

    });

    themeBtn.addEventListener('click', toggleTheme);

}

function validateTask(text){

    if(!text.trim()){
        return 'Detyra është bosh';
    }

    if(text.length < 3){
        return 'Detyra shumë e shkurtër';
    }

    if(text.length > 120){
        return 'Detyra shumë e gjatë';
    }

    return null;
}

function addTask(){

    const text = taskInput.value.trim();

    const validationError = validateTask(text);

    if(validationError){

        alert(validationError);

        return;
    }

    const task = {

        id: crypto.randomUUID(),

        text,

        priority: prioritySelect.value,

        completed:false

    };

    state.tasks.push(task);

    saveTasks();

    renderTasks();

    taskInput.value = '';
}

function renderTasks(){

    taskList.textContent = '';

    if(state.tasks.length === 0){

        const empty = document.createElement('div');

        empty.className = 'empty';

        empty.textContent = 'Nuk ka detyra';

        taskList.appendChild(empty);

        updateStats();

        return;
    }

    state.tasks.forEach(task => {

        const taskEl = document.createElement('div');

        taskEl.className = 'task';

        if(task.completed){
            taskEl.classList.add('completed');
        }

        const checkbox = document.createElement('input');

        checkbox.type = 'checkbox';

        checkbox.checked = task.completed;

        checkbox.addEventListener('change', () => {

            task.completed = !task.completed;

            saveTasks();

            renderTasks();

        });

        const text = document.createElement('div');

        text.className = 'task-text';

        text.textContent = task.text;

        const priority = document.createElement('div');

        priority.className = `priority ${task.priority}`;

        priority.textContent = task.priority.toUpperCase();

        const deleteBtn = document.createElement('button');

        deleteBtn.className = 'btn-danger';

        deleteBtn.textContent = 'Fshi';

        deleteBtn.addEventListener('click', () => {

            state.tasks = state.tasks.filter(t => t.id !== task.id);

            saveTasks();

            renderTasks();

        });

        taskEl.appendChild(checkbox);

        taskEl.appendChild(text);

        taskEl.appendChild(priority);

        taskEl.appendChild(deleteBtn);

        taskList.appendChild(taskEl);

    });

    updateStats();
}

function updateStats(){

    totalTasks.textContent = state.tasks.length;

    const completed = state.tasks.filter(t => t.completed).length;

    completedTasks.textContent = completed;
}

function saveTasks(){

    try{

        localStorage.setItem(
            'mindlist_tasks',
            JSON.stringify(state.tasks)
        );

    }catch(error){

        console.error(error);

        alert('Gabim në ruajtje');

    }

}

function loadTasks(){

    try{

        return JSON.parse(
            localStorage.getItem('mindlist_tasks')
        ) || [];

    }catch(error){

        console.error(error);

        return [];

    }

}

function toggleTheme(){

    document.body.classList.toggle('dark');

    localStorage.setItem(
        'mindlist_theme',
        document.body.classList.contains('dark')
        ? 'dark'
        : 'light'
    );

    updateThemeButton();
}

function loadTheme(){

    const theme = localStorage.getItem('mindlist_theme');

    if(theme === 'dark'){

        document.body.classList.add('dark');

    }

    updateThemeButton();
}

function updateThemeButton(){

    themeBtn.textContent =
        document.body.classList.contains('dark')
        ? '☀️'
        : '🌙';
}

</script>

</body>
</html>
