<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>VALORA Notes MVP</title>

<style>
  :root {
    --bg: #f6f7fb;
    --panel: #ffffff;
    --text: #111;
    --accent: #4f46e5;
    --border: #e5e7eb;
  }

  [data-theme="dark"] {
    --bg: #0f172a;
    --panel: #111827;
    --text: #f9fafb;
    --border: #1f2937;
  }

  * {
    box-sizing: border-box;
    font-family: Arial, sans-serif;
  }

  body {
    margin: 0;
    display: flex;
    height: 100vh;
    background: var(--bg);
    color: var(--text);
  }

  /* Sidebar */
  .sidebar {
    width: 280px;
    background: var(--panel);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    padding: 10px;
  }

  .logo {
    font-size: 20px;
    font-weight: bold;
    padding: 10px;
    color: var(--accent);
  }

  button {
    cursor: pointer;
  }

  .btn {
    padding: 8px;
    margin: 5px 0;
    border: none;
    background: var(--accent);
    color: white;
    border-radius: 6px;
  }

  .note-list {
    overflow-y: auto;
    flex: 1;
  }

  .note-item {
    padding: 10px;
    border-radius: 6px;
    margin: 5px 0;
    background: transparent;
    border: 1px solid var(--border);
    cursor: pointer;
  }

  .note-item.active {
    background: var(--accent);
    color: white;
  }

  /* Main */
  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
  }

  .topbar {
    padding: 10px;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    display: flex;
    gap: 10px;
  }

  input, textarea {
    width: 100%;
    padding: 10px;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: var(--panel);
    color: var(--text);
  }

  textarea {
    flex: 1;
    resize: none;
  }

  .editor {
    flex: 1;
    padding: 10px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .small {
    font-size: 12px;
    opacity: 0.7;
  }
</style>
</head>

<body>

<div class="sidebar">
  <div class="logo">VALORA</div>

  <button class="btn" onclick="createNote()">+ New Note</button>
  <button class="btn" onclick="toggleTheme()">🌙 Toggle Theme</button>

  <input placeholder="Search..." oninput="searchNotes(this.value)" />

  <div class="note-list" id="noteList"></div>
</div>

<div class="main">
  <div class="topbar">
    <input id="title" placeholder="Note title..." oninput="updateNote()" />
    <button class="btn" onclick="deleteNote()">Delete</button>
    <button class="btn" onclick="togglePin()">Pin</button>
  </div>

  <div class="editor">
    <textarea id="content" placeholder="Write your note..." oninput="updateNote()"></textarea>
    <div class="small" id="info"></div>
  </div>
</div>

<script>
let notes = JSON.parse(localStorage.getItem("valora_notes") || "[]");
let activeId = null;

/* INIT */
function init() {
  if (notes.length === 0) {
    createNote(true);
  } else {
    activeId = notes[0].id;
  }
  render();
}

/* CREATE NOTE */
function createNote(skipRender=false) {
  const note = {
    id: Date.now(),
    title: "Untitled",
    content: "",
    pinned: false,
    created: new Date().toISOString()
  };

  notes.unshift(note);
  activeId = note.id;
  save();

  if (!skipRender) render();
}

/* UPDATE NOTE */
function updateNote() {
  const note = notes.find(n => n.id === activeId);
  if (!note) return;

  note.title = document.getElementById("title").value;
  note.content = document.getElementById("content").value;

  save();
  renderList();
}

/* DELETE */
function deleteNote() {
  notes = notes.filter(n => n.id !== activeId);
  activeId = notes[0]?.id || null;
  save();
  render();
}

/* PIN */
function togglePin() {
  const note = notes.find(n => n.id === activeId);
  if (!note) return;
  note.pinned = !note.pinned;
  save();
  renderList();
}

/* SEARCH */
function searchNotes(q) {
  renderList(q);
}

/* SELECT NOTE */
function selectNote(id) {
  activeId = id;
  render();
}

/* RENDER */
function render() {
  const note = notes.find(n => n.id === activeId);

  document.getElementById("title").value = note?.title || "";
  document.getElementById("content").value = note?.content || "";

  renderList();
  updateInfo();
}

function renderList(query="") {
  const list = document.getElementById("noteList");
  list.innerHTML = "";

  let filtered = notes.filter(n =>
    n.title.toLowerCase().includes(query.toLowerCase()) ||
    n.content.toLowerCase().includes(query.toLowerCase())
  );

  // pinned first
  filtered.sort((a,b) => b.pinned - a.pinned);

  filtered.forEach(n => {
    const div = document.createElement("div");
    div.className = "note-item" + (n.id === activeId ? " active" : "");
    div.innerHTML = (n.pinned ? "📌 " : "") + n.title;
    div.onclick = () => selectNote(n.id);
    list.appendChild(div);
  });
}

/* SAVE */
function save() {
  localStorage.setItem("valora_notes", JSON.stringify(notes));
}

/* THEME */
function toggleTheme() {
  const t = document.body.getAttribute("data-theme");
  document.body.setAttribute("data-theme", t === "dark" ? "light" : "dark");
}

/* INFO */
function updateInfo() {
  const note = notes.find(n => n.id === activeId);
  document.getElementById("info").innerText =
    note ? `Created: ${new Date(note.created).toLocaleString()}` : "";
}

init();
</script>

</body>
</html>
