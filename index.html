<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Organizer</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif; }
        
        /* Sfondi i ri modern me Gradient */
        body { 
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%); 
            color: #f8fafc; 
            min-height: 100vh;
            padding-bottom: 90px; 
        }
        
        /* Koka e aplikacionit */
        header { 
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            color: #38bdf8; 
            padding: 20px; 
            text-align: center; 
            font-size: 22px; 
            font-weight: 700; 
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            letter-spacing: 0.5px;
        }
        
        .page { display: none; padding: 20px; animation: fadeIn 0.4s ease-out; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Inputet e stilit "Glass" */
        .input-group { display: flex; gap: 12px; margin-bottom: 25px; }
        input, textarea, select { 
            flex: 1; 
            padding: 14px; 
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1); 
            border-radius: 12px; 
            font-size: 16px; 
            color: white;
            outline: none;
            transition: all 0.3s;
        }
        input:focus, textarea:focus {
            background: rgba(255, 255, 255, 0.08);
            border-color: #38bdf8;
            box-shadow: 0 0 10px rgba(56, 189, 248, 0.2);
        }
        input::placeholder, textarea::placeholder { color: #94a3b8; }

        /* Butonat modernë */
        button { 
            background: linear-gradient(135deg, #10b981 0%, #059669 100%); 
            color: white; 
            border: none; 
            padding: 14px 24px; 
            border-radius: 12px; 
            cursor: pointer; 
            font-weight: 600; 
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.2);
            transition: all 0.2s;
        }
        button:active { transform: scale(0.97); }
        .btn-blue { 
            background: linear-gradient(135deg, #0ea5e9 0%, #2563eb 100%); 
            box-shadow: 0 4px 12px rgba(14, 165, 233, 0.2);
        }

        /* Kartat e Listës (Stil Glassmorphism) */
        .list-item { 
            background: rgba(255, 255, 255, 0.03); 
            padding: 16px; 
            border-radius: 14px; 
            margin-bottom: 12px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
            transition: all 0.3s ease;
        }
        
        /* Ndryshimi i bukur i ngjyrës kur detyra KRYHET */
        .list-item.completed { 
            background: rgba(16, 185, 129, 0.1); 
            border-left: 4px solid #10b981; 
            border-top: 1px solid rgba(16, 185, 129, 0.2);
            border-right: 1px solid rgba(16, 185, 129, 0.2);
            border-bottom: 1px solid rgba(16, 185, 129, 0.2);
        }
        .list-item.completed span { color: #a7f3d0; }
        
        .action-btns { display: flex; gap: 8px; }
        .edit-btn { background: rgba(245, 158, 11, 0.15); color: #fbbf24; border: 1px solid rgba(245, 158, 11, 0.3); padding: 8px 12px; border-radius: 8px; box-shadow: none; font-size: 14px;}
        .delete-btn { background: rgba(239, 68, 68, 0.15); color: #fca5a5; border: 1px solid rgba(239, 68, 68, 0.3); padding: 8px 12px; border-radius: 8px; box-shadow: none; font-size: 14px;}
        .edit-btn:hover { background: #f59e0b; color: white; }
        .delete-btn:hover { background: #ef4444; color: white; }

        /* Menuja e Navigimit e Errët në fund */
        .bottom-nav { 
            position: fixed; 
            bottom: 0; 
            left: 0; 
            width: 100%; 
            background: rgba(15, 23, 42, 0.8); 
            backdrop-filter: blur(15px);
            display: flex; 
            border-top: 1px solid rgba(255, 255, 255, 0.08); 
            box-shadow: 0 -4px 24px rgba(0,0,0,0.3); 
            padding: 8px 0;
        }
        .nav-item { flex: 1; text-align: center; padding: 8px 0; color: #94a3b8; cursor: pointer; font-size: 12px; font-weight: 500; transition: all 0.3s; }
        .nav-item.active { color: #38bdf8; transform: translateY(-2px); }
        .nav-icon { font-size: 22px; display: block; margin-bottom: 4px; transition: transform 0.2s; }
        .nav-item.active .nav-icon { transform: scale(1.1); filter: drop-shadow(0 0 8px rgba(56, 189, 248, 0.5)); }

        /* Kartat e Ecurisë */
        .stats-container { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 10px; }
        .stat-card { 
            background: rgba(255, 255, 255, 0.03); 
            padding: 22px; 
            border-radius: 16px; 
            text-align: center; 
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .stat-number { font-size: 28px; font-weight: 700; color: #38bdf8; margin-top: 8px; }

        /* Butonat e Gjuhës */
        .lang-btn { 
            width: 100%; 
            padding: 15px; 
            margin-bottom: 10px; 
            border: 1px solid rgba(255, 255, 255, 0.08); 
            border-radius: 12px; 
            background: rgba(255, 255, 255, 0.02); 
            color: #e2e8f0;
            font-size: 16px; 
            font-weight: 600; 
            cursor: pointer; 
            text-align: left; 
            box-shadow: none;
            transition: all 0.2s;
        }
        .lang-btn.active { 
            background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%); 
            color: white; 
            border-color: #3b82f6; 
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
        }
    </style>
</head>
<body>

    <header id="app-title">Detyrat e Mia</header>

    <div id="page-tasks" class="page active">
        <div class="input-group">
            <input type="text" id="task-input" placeholder="Shto një detyrë të re...">
            <button onclick="addTask()" id="btn-add-task">Shto</button>
        </div>
        <div id="tasks-list"></div>
    </div>

    <div id="page-notes" class="page">
        <div class="input-group" style="flex-direction: column;">
            <textarea id="note-input" rows="4" placeholder="Shkruaj një shënim të ri apo një ide..."></textarea>
            <button onclick="addNote()" class="btn-blue" id="btn-save-note" style="width: 100%;">Ruaj Shënimin</button>
        </div>
        <div id="notes-list"></div>
    </div>

    <div id="page-stats" class="page">
        <div class="stats-container">
            <div class="stat-card">
                <div id="text-total-tasks" style="color: #94a3b8;">Gjithsej Detyra</div>
                <div id="total-tasks-count" class="stat-number">0</div>
            </div>
            <div class="stat-card">
                <div id="text-done-tasks" style="color: #94a3b8;">Të Kryera</div>
                <div id="completed-tasks-count" class="stat-number" style="color: #10b981;">0</div>
            </div>
        </div>
        <div class="stat-card" style="margin-top: 15px;">
            <div id="text-total-notes" style="color: #94a3b8;">Gjithsej Shënime</div>
            <div id="total-notes-count" class="stat-number" style="color: #0ea5e9;">0</div>
        </div>
    </div>

    <div id="page-settings" class="page">
        <h3 style="margin-bottom: 20px; color: #94a3b8; font-weight: 500; font-size: 16px;" id="text-select-lang">Zgjidh Gjuhën / Select Language</h3>
        <button class="lang-btn" onclick="changeLanguage('en')" id="lang-en">🇬🇧 Anglisht / English</button>
        <button class="lang-btn active" onclick="changeLanguage('sq')" id="lang-sq">🇦🇱 Shqip</button>
        <button class="lang-btn" onclick="changeLanguage('fr')" id="lang-fr">🇫🇷 Frëngjisht / Français</button>
        <button class="lang-btn" onclick="changeLanguage('de')" id="lang-de">🇩🇪 Gjermanisht / Deutsch</button>
        <button class="lang-btn" onclick="changeLanguage('it')" id="lang-it">🇮🇹 Italiano</button>
        <button class="lang-btn" onclick="changeLanguage('es')" id="lang-es">🇪🇸 Spanjisht / Español</button>
    </div>

    <div class="bottom-nav">
        <div class="nav-item active" onclick="switchPage('tasks', this)" id="nav-tasks">
            <span class="nav-icon">📋</span><span id="nav-text-tasks">Detyrat</span>
        </div>
        <div class="nav-item" onclick="switchPage('notes', this)" id="nav-notes">
            <span class="nav-icon">📝</span><span id="nav-text-notes">Shënim</span>
        </div>
        <div class="nav-item" onclick="switchPage('stats', this)" id="nav-stats">
            <span class="nav-icon">📊</span><span id="nav-text-stats">Ecuria</span>
        </div>
        <div class="nav-item" onclick="switchPage('settings', this)" id="nav-settings">
            <span class="nav-icon">⚙️</span><span id="nav-text-settings">Cilësime</span>
        </div>
    </div>
